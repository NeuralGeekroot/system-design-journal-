<svg width="100%" viewBox="0 0 700 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Vertical partitioning of a wide users table</title>
<desc>A wide users table is split by column into profile, auth, and billing tables, each joined back by the same user_id key.</desc>
<defs>
  <marker id="arrow15" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Vertical Partitioning — split by column, not by row</text>

<rect x="130" y="40" width="440" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="350" y="64" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">users</text>
<text x="350" y="82" text-anchor="middle" font-size="10" fill="#5F5E5A">id, name, email, avatar, bio, password_hash, login_count, billing_address, card_last_four</text>

<rect x="30" y="170" width="190" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="125" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">users_profile</text>
<text x="125" y="210" text-anchor="middle" font-size="10" fill="#0F6E56">id, name, email,</text>
<text x="125" y="224" text-anchor="middle" font-size="10" fill="#0F6E56">avatar_url, bio</text>

<rect x="255" y="170" width="190" height="66" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="350" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">users_auth</text>
<text x="350" y="210" text-anchor="middle" font-size="10" fill="#1D5DA6">id, password_hash,</text>
<text x="350" y="224" text-anchor="middle" font-size="10" fill="#1D5DA6">login_count</text>

<rect x="480" y="170" width="190" height="66" rx="10" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="575" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#8C1D18">users_billing</text>
<text x="575" y="210" text-anchor="middle" font-size="10" fill="#B3261E">id, billing_address,</text>
<text x="575" y="224" text-anchor="middle" font-size="10" fill="#B3261E">card_last_four</text>

<line x1="280" y1="100" x2="125" y2="168" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow15)"/>
<line x1="330" y1="100" x2="350" y2="168" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow15)"/>
<line x1="400" y1="100" x2="575" y2="168" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow15)"/>

<text x="20" y="272" font-size="11" fill="#52514E">A profile-page query only touches the profile table — fewer bytes read, and billing/auth get their own access controls.</text>
</svg>
