<svg width="100%" viewBox="0 0 700 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>IP Address routing</title>
<desc>A packet travels from a device through a router and the internet backbone to a server, each identified by an IP address.</desc>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="28" font-size="15" font-weight="600" fill="#0B0B0B">IP Address — packet routing</text>

<rect x="20" y="70" width="140" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="90" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Your Device</text>
<text x="90" y="112" text-anchor="middle" font-size="11" fill="#0F6E56">192.168.1.10 (private)</text>

<rect x="205" y="70" width="130" height="64" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="270" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#44443F">Router</text>
<text x="270" y="112" text-anchor="middle" font-size="11" fill="#5F5E5A">NAT gateway</text>

<rect x="380" y="70" width="140" height="64" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="450" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#123E70">Internet</text>
<text x="450" y="112" text-anchor="middle" font-size="11" fill="#1D5DA6">backbone</text>

<rect x="560" y="70" width="120" height="64" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="620" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Server</text>
<text x="620" y="112" text-anchor="middle" font-size="11" fill="#993C1D">142.250.80.46</text>

<line x1="162" y1="102" x2="203" y2="102" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="337" y1="102" x2="378" y2="102" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow2)"/>
<line x1="522" y1="102" x2="558" y2="102" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow2)"/>
<text x="450" y="60" text-anchor="middle" font-size="11" fill="#52514E">packet routed hop by hop toward the destination IP</text>

<line x1="20" y1="170" x2="680" y2="170" stroke="#E5E3DC" stroke-width="1"/>
<rect x="20" y="188" width="320" height="50" rx="8" fill="#F7F6F2" stroke="#E5E3DC" stroke-width="1"/>
<text x="36" y="208" font-size="12" font-weight="600" fill="#0B0B0B">IPv4</text>
<text x="36" y="226" font-size="11" fill="#52514E">32-bit, e.g. 192.168.1.1 — ~4.3B addresses (exhausted)</text>

<rect x="360" y="188" width="320" height="50" rx="8" fill="#F7F6F2" stroke="#E5E3DC" stroke-width="1"/>
<text x="376" y="208" font-size="12" font-weight="600" fill="#0B0B0B">IPv6</text>
<text x="376" y="226" font-size="11" fill="#52514E">128-bit, e.g. 2001:0db8::8a2e — effectively unlimited</text>
</svg>
