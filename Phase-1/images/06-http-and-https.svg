<svg width="100%" viewBox="0 0 700 340" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>HTTPS handshake then request/response</title>
<desc>A TLS handshake (ClientHello, ServerHello plus certificate, key exchange) establishes an encrypted channel, after which ordinary HTTP requests and responses flow over it.</desc>
<defs>
  <marker id="arrow6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">HTTPS = HTTP + a TLS handshake up front</text>

<rect x="30" y="40" width="130" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="95" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>
<rect x="540" y="40" width="130" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Server</text>

<line x1="95" y1="90" x2="95" y2="300" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="605" y1="90" x2="605" y2="300" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>

<line x1="95" y1="115" x2="605" y2="115" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow6)"/>
<text x="350" y="108" text-anchor="middle" font-size="11" fill="#1D5DA6">1  ClientHello (TLS version, ciphers)</text>

<line x1="605" y1="145" x2="95" y2="145" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow6)"/>
<text x="350" y="138" text-anchor="middle" font-size="11" fill="#1D5DA6">2  ServerHello + Certificate</text>

<line x1="95" y1="175" x2="605" y2="175" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow6)"/>
<text x="350" y="168" text-anchor="middle" font-size="11" fill="#1D5DA6">3  Key exchange</text>

<text x="350" y="196" text-anchor="middle" font-size="10" font-style="italic" fill="#52514E">— encrypted channel established —</text>

<line x1="95" y1="222" x2="605" y2="222" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow6)"/>
<text x="350" y="215" text-anchor="middle" font-size="11" fill="#1D9E75">4  GET /api/users (encrypted)</text>

<line x1="605" y1="252" x2="95" y2="252" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow6)"/>
<text x="350" y="245" text-anchor="middle" font-size="11" fill="#D85A30">5  200 OK + JSON (encrypted)</text>

<line x1="30" y1="290" x2="670" y2="290" stroke="#E5E3DC" stroke-width="1"/>
<text x="30" y="315" font-size="12" fill="#52514E">HTTP is stateless — login state lives in a cookie/token/Redis session, never in server memory.</text>
</svg>
