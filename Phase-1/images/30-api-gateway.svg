<svg width="100%" viewBox="0 0 700 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>API Gateway routing to backend services</title>
<desc>Web, mobile, and third-party clients all talk to a single API gateway, which handles auth, rate limiting, and routing before forwarding to the right backend service.</desc>
<defs>
  <marker id="arrow30" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="22" font-size="14" font-weight="600" fill="#0B0B0B">API Gateway — one door in front of every service</text>

<rect x="20" y="40" width="110" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="64" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">Web Client</text>
<rect x="20" y="90" width="110" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="114" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">Mobile Client</text>
<rect x="20" y="140" width="110" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="164" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">3rd-party</text>

<rect x="200" y="50" width="220" height="140" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="310" y="74" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">API Gateway</text>
<rect x="216" y="86" width="90" height="24" rx="6" fill="#FFFFFF" stroke="#C9C7BE" stroke-width="1"/>
<text x="261" y="102" text-anchor="middle" font-size="9" fill="#44443F">Authn/z</text>
<rect x="314" y="86" width="90" height="24" rx="6" fill="#FFFFFF" stroke="#C9C7BE" stroke-width="1"/>
<text x="359" y="102" text-anchor="middle" font-size="9" fill="#44443F">Rate limit</text>
<rect x="216" y="116" width="90" height="24" rx="6" fill="#FFFFFF" stroke="#C9C7BE" stroke-width="1"/>
<text x="261" y="132" text-anchor="middle" font-size="9" fill="#44443F">Routing</text>
<rect x="314" y="116" width="90" height="24" rx="6" fill="#FFFFFF" stroke="#C9C7BE" stroke-width="1"/>
<text x="359" y="132" text-anchor="middle" font-size="9" fill="#44443F">Transform</text>
<rect x="216" y="146" width="188" height="24" rx="6" fill="#FFFFFF" stroke="#C9C7BE" stroke-width="1"/>
<text x="310" y="162" text-anchor="middle" font-size="9" fill="#44443F">Caching</text>

<rect x="530" y="30" width="150" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="54" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Users Service</text>
<rect x="530" y="80" width="150" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="104" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Orders Service</text>
<rect x="530" y="130" width="150" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="154" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Payments Service</text>
<rect x="530" y="180" width="150" height="40" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="204" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Search Service</text>

<line x1="132" y1="60" x2="198" y2="90" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow30)"/>
<line x1="132" y1="110" x2="198" y2="115" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow30)"/>
<line x1="132" y1="160" x2="198" y2="140" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow30)"/>

<line x1="422" y1="90" x2="528" y2="50" stroke="#1D9E75" stroke-width="1.3" marker-end="url(#arrow30)"/>
<line x1="422" y1="105" x2="528" y2="100" stroke="#1D9E75" stroke-width="1.3" marker-end="url(#arrow30)"/>
<line x1="422" y1="130" x2="528" y2="150" stroke="#1D9E75" stroke-width="1.3" marker-end="url(#arrow30)"/>
<line x1="422" y1="150" x2="528" y2="200" stroke="#1D9E75" stroke-width="1.3" marker-end="url(#arrow30)"/>

<text x="20" y="240" font-size="11" fill="#52514E">Centralizes auth, rate limiting, and routing so no individual service reimplements them.</text>
</svg>
