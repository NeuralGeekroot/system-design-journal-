<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>REST API resource design</title>
<desc>A client sends standard HTTP verbs to resource URLs on a REST API, which reads and writes a database and returns JSON.</desc>
<defs>
  <marker id="arrow8" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">REST — everything is a resource + a verb</text>

<rect x="20" y="46" width="120" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="80" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="290" y="46" width="140" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="360" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">REST API</text>

<rect x="560" y="46" width="120" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="620" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Database</text>

<line x1="142" y1="66" x2="288" y2="66" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow8)"/>
<text x="215" y="58" text-anchor="middle" font-size="10" fill="#1D9E75">GET /users/42</text>
<line x1="288" y1="90" x2="142" y2="90" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow8)"/>
<text x="215" y="106" text-anchor="middle" font-size="10" fill="#D85A30">200 OK + JSON</text>

<line x1="432" y1="76" x2="558" y2="76" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow8)"/>

<line x1="20" y1="130" x2="680" y2="130" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="154" font-size="12" font-weight="600" fill="#0B0B0B">/users resource — verbs map to CRUD</text>

<rect x="20" y="168" width="640" height="26" rx="6" fill="#F7F6F2"/>
<text x="32" y="186" font-size="11" fill="#44443F"><tspan font-weight="600">GET /users</tspan> — list all users</text>

<rect x="20" y="198" width="640" height="26" rx="6" fill="#F7F6F2"/>
<text x="32" y="216" font-size="11" fill="#44443F"><tspan font-weight="600">POST /users</tspan> — create a user</text>

<rect x="20" y="228" width="640" height="26" rx="6" fill="#F7F6F2"/>
<text x="32" y="246" font-size="11" fill="#44443F"><tspan font-weight="600">GET /users/{id}</tspan> — get one user</text>

<rect x="20" y="258" width="640" height="26" rx="6" fill="#F7F6F2"/>
<text x="32" y="276" font-size="11" fill="#44443F"><tspan font-weight="600">PUT /users/{id}</tspan> — replace &#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;<tspan font-weight="600">DELETE /users/{id}</tspan> — delete</text>

<text x="20" y="308" font-size="11" font-style="italic" fill="#8A8880">GET /users/{id}/orders — nested resource: a user's orders</text>
</svg>
