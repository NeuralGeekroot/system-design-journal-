<svg width="100%" viewBox="0 0 700 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>CAP theorem trade-off during a network partition</title>
<desc>A distributed system can guarantee at most two of Consistency, Availability, and Partition tolerance; since partitions are unavoidable, the real choice during one is CP versus AP.</desc>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">CAP Theorem — pick 2, but P isn't optional in a real network</text>

<rect x="40" y="46" width="180" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="130" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Consistency</text>
<text x="130" y="88" text-anchor="middle" font-size="9" fill="#0F6E56">every read = latest write</text>

<rect x="260" y="46" width="180" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="350" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Availability</text>
<text x="350" y="88" text-anchor="middle" font-size="9" fill="#993C1D">every request gets a response</text>

<rect x="480" y="46" width="180" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="570" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Partition Tolerance</text>
<text x="570" y="88" text-anchor="middle" font-size="9" fill="#5F5E5A">survives a network split</text>

<rect x="60" y="150" width="270" height="100" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="195" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">CP systems</text>
<text x="195" y="198" text-anchor="middle" font-size="10" fill="#534AB7">refuse a request rather than</text>
<text x="195" y="214" text-anchor="middle" font-size="10" fill="#534AB7">risk stale data</text>
<text x="195" y="234" text-anchor="middle" font-size="10" fill="#534AB7">MongoDB, HBase, Zookeeper</text>

<rect x="370" y="150" width="270" height="100" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="505" y="176" text-anchor="middle" font-size="13" font-weight="600" fill="#123E70">AP systems</text>
<text x="505" y="198" text-anchor="middle" font-size="10" fill="#1D5DA6">always answer, even with</text>
<text x="505" y="214" text-anchor="middle" font-size="10" fill="#1D5DA6">possibly-stale data</text>
<text x="505" y="234" text-anchor="middle" font-size="10" fill="#1D5DA6">Cassandra, DynamoDB, CouchDB</text>

<text x="20" y="280" font-size="11" fill="#52514E">The real-world choice is CP vs AP during a partition — and it's usually made per-endpoint, not once for the whole system.</text>
</svg>
