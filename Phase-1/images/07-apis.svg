<svg width="100%" viewBox="0 0 760 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>API request pipeline</title>
<desc>A client request passes through an API endpoint, authentication and validation, business logic, and finally the database, then a response flows back.</desc>
<defs>
  <marker id="arrow7" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">An API is a contract in front of everything behind it</text>

<rect x="20" y="60" width="100" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="70" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client App</text>

<rect x="160" y="60" width="130" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="225" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">API Endpoint</text>

<rect x="330" y="60" width="140" height="60" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="400" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">Auth +</text>
<text x="400" y="102" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">Validation</text>

<rect x="510" y="60" width="130" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="575" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Business Logic</text>

<rect x="680" y="60" width="60" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="710" y="94" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">DB</text>

<line x1="122" y1="90" x2="158" y2="90" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow7)"/>
<line x1="292" y1="90" x2="328" y2="90" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow7)"/>
<line x1="472" y1="90" x2="508" y2="90" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow7)"/>
<line x1="642" y1="90" x2="678" y2="90" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow7)"/>

<polyline points="710,122 710,180 70,180 70,122" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow7)"/>
<text x="390" y="197" text-anchor="middle" font-size="11" fill="#D85A30">response — same shape/status codes every time, regardless of client type</text>

<line x1="20" y1="215" x2="740" y2="215" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="240" font-size="12" fill="#52514E">The contract (endpoint, params, auth, response shape, error codes) is what lets the implementation behind it change freely.</text>
</svg>
