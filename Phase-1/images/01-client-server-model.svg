<svg width="100%" viewBox="0 0 640 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Client-Server Model</title>
<desc>A client sends an HTTP request to a server and receives a response; the server in turn becomes a client when it queries its own database.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="28" font-size="15" font-weight="600" fill="#0B0B0B">Client-Server Model</text>

<rect x="40" y="70" width="150" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="115" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">Client</text>
<text x="115" y="114" text-anchor="middle" font-size="11" fill="#0F6E56">browser / mobile app</text>

<rect x="280" y="70" width="150" height="64" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="355" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Server</text>
<text x="355" y="114" text-anchor="middle" font-size="11" fill="#993C1D">backend / API</text>

<rect x="280" y="200" width="150" height="64" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="355" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Database</text>
<text x="355" y="244" text-anchor="middle" font-size="11" fill="#534AB7">storage</text>

<line x1="192" y1="90" x2="278" y2="90" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="235" y="82" text-anchor="middle" font-size="11" fill="#1D9E75">HTTP request</text>

<line x1="278" y1="116" x2="192" y2="116" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="235" y="134" text-anchor="middle" font-size="11" fill="#D85A30">HTTP response</text>

<line x1="355" y1="136" x2="355" y2="198" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="440" y="170" font-size="11" fill="#5F5E5A">query — server is</text>
<text x="440" y="186" font-size="11" fill="#5F5E5A">now the "client"</text>

<line x1="40" y1="285" x2="600" y2="285" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="285" font-size="12" fill="#52514E" transform="translate(0,20)">Client-server is a role, not a machine — the same process can be a server to one caller and a client to the next hop.</text>
</svg>
