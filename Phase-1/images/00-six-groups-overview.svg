<svg width="100%" viewBox="0 0 760 200" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>How the six concept groups build on each other</title>
<desc>Networking foundations lead to APIs and communication, then data storage, then scaling, then distributed systems trade-offs, then architecture patterns that tie everything together.</desc>
<defs>
  <marker id="arrowov" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="10" y="60" width="115" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="67" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Networking</text>
<text x="67" y="104" text-anchor="middle" font-size="10" fill="#0F6E56">Foundations</text>

<rect x="140" y="60" width="115" height="70" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="197" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">APIs &amp;</text>
<text x="197" y="104" text-anchor="middle" font-size="10" fill="#1D5DA6">Communication</text>

<rect x="270" y="60" width="115" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="327" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">Data</text>
<text x="327" y="104" text-anchor="middle" font-size="10" fill="#534AB7">Storage</text>

<rect x="400" y="60" width="115" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="457" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Scaling</text>

<rect x="530" y="60" width="115" height="70" rx="10" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="587" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#8C1D18">Distributed</text>
<text x="587" y="104" text-anchor="middle" font-size="10" fill="#B3261E">Systems</text>

<rect x="660" y="60" width="95" height="70" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="707" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#44443F">Architecture</text>
<text x="707" y="104" text-anchor="middle" font-size="10" fill="#5F5E5A">Patterns</text>

<line x1="127" y1="95" x2="138" y2="95" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrowov)"/>
<line x1="257" y1="95" x2="268" y2="95" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrowov)"/>
<line x1="387" y1="95" x2="398" y2="95" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrowov)"/>
<line x1="517" y1="95" x2="528" y2="95" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrowov)"/>
<line x1="647" y1="95" x2="658" y2="95" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrowov)"/>

<text x="20" y="24" font-size="14" font-weight="600" fill="#0B0B0B">Every design problem is some composition of these six groups</text>
<text x="20" y="168" font-size="11" fill="#52514E">Machines find each other → apps exchange data → data lives somewhere → traffic grows → many machines trade off → it's all organized into one system.</text>
</svg>
