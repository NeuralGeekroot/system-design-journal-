<svg width="100%" viewBox="0 0 720 330" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>DNS resolution chain</title>
<desc>A client's domain lookup travels from resolver to root server to TLD server to authoritative name server, and the IP address is cached back at every hop.</desc>
<defs>
  <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="26" font-size="15" font-weight="600" fill="#0B0B0B">DNS Resolution — "where is www.example.com?"</text>

<rect x="20" y="60" width="110" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>
<text x="75" y="103" text-anchor="middle" font-size="10" fill="#0F6E56">browser</text>

<rect x="160" y="60" width="120" height="64" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="220" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">Resolver</text>
<text x="220" y="103" text-anchor="middle" font-size="10" fill="#1D5DA6">ISP / 1.1.1.1</text>

<rect x="310" y="60" width="110" height="64" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="365" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Root NS</text>
<text x="365" y="103" text-anchor="middle" font-size="10" fill="#5F5E5A">"."</text>

<rect x="450" y="60" width="110" height="64" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="505" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">TLD NS</text>
<text x="505" y="103" text-anchor="middle" font-size="10" fill="#5F5E5A">.com</text>

<rect x="590" y="60" width="120" height="64" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="650" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Authoritative NS</text>
<text x="650" y="103" text-anchor="middle" font-size="10" fill="#993C1D">example.com</text>

<line x1="132" y1="80" x2="158" y2="80" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="145" y="72" text-anchor="middle" font-size="10" fill="#1D9E75">1</text>
<line x1="282" y1="80" x2="308" y2="80" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="295" y="72" text-anchor="middle" font-size="10" fill="#1D9E75">2</text>
<line x1="422" y1="80" x2="448" y2="80" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="435" y="72" text-anchor="middle" font-size="10" fill="#1D9E75">3</text>
<line x1="562" y1="80" x2="588" y2="80" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="575" y="72" text-anchor="middle" font-size="10" fill="#1D9E75">4</text>

<polyline points="650,126 650,155 75,155 75,126" fill="none" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow3)"/>
<text x="360" y="172" text-anchor="middle" font-size="11" fill="#D85A30">5 — answer flows back and is cached at every hop for its TTL</text>

<line x1="20" y1="200" x2="700" y2="200" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="222" font-size="12" font-weight="600" fill="#0B0B0B">Resolution steps</text>
<text x="20" y="244" font-size="11" fill="#52514E">1  Client asks the recursive resolver to resolve www.example.com</text>
<text x="20" y="264" font-size="11" fill="#52514E">2  Resolver asks the Root server, which points to the .com TLD server</text>
<text x="20" y="284" font-size="11" fill="#52514E">3  Resolver asks the TLD server, which points to the authoritative NS</text>
<text x="20" y="304" font-size="11" fill="#52514E">4-5  Resolver asks the authoritative NS, gets the A record, returns it to the client (cached for TTL)</text>
</svg>
