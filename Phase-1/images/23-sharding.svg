<svg width="100%" viewBox="0 0 700 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Sharding data across nodes by shard key</title>
<desc>A shard router hashes the shard key and routes each row to one of four shards, each holding only its own subset of rows.</desc>
<defs>
  <marker id="arrow23" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Sharding — each node holds a different subset of rows</text>

<rect x="20" y="90" width="110" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="75" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">App Server</text>

<rect x="200" y="90" width="160" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="280" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#44443F">Shard Router</text>
<text x="280" y="134" text-anchor="middle" font-size="9" fill="#5F5E5A">hash(user_id) % 4</text>

<rect x="450" y="20" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="505" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Shard 0</text>
<text x="505" y="58" text-anchor="middle" font-size="9" fill="#534AB7">id % 4 = 0</text>

<rect x="450" y="80" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="505" y="102" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Shard 1</text>
<text x="505" y="118" text-anchor="middle" font-size="9" fill="#534AB7">id % 4 = 1</text>

<rect x="450" y="140" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="505" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Shard 2</text>
<text x="505" y="178" text-anchor="middle" font-size="9" fill="#534AB7">id % 4 = 2</text>

<rect x="450" y="200" width="110" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="505" y="222" text-anchor="middle" font-size="10" font-weight="600" fill="#3C3489">Shard 3</text>
<text x="505" y="238" text-anchor="middle" font-size="9" fill="#534AB7">id % 4 = 3</text>

<line x1="132" y1="120" x2="198" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow23)"/>
<line x1="362" y1="105" x2="448" y2="45" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow23)"/>
<line x1="362" y1="112" x2="448" y2="105" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow23)"/>
<line x1="362" y1="128" x2="448" y2="165" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow23)"/>
<line x1="362" y1="135" x2="448" y2="225" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow23)"/>

<text x="20" y="270" font-size="11" fill="#52514E">A bad shard key creates hot shards; cross-shard joins and rebalancing are the real operational cost.</text>
</svg>
