<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Idempotency key prevents a duplicate charge on retry</title>
<desc>A client sends a payment request with an idempotency key; when a network issue forces a retry with the same key, the server returns the stored result instead of processing the payment again.</desc>
<defs>
  <marker id="arrow26" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="22" font-size="14" font-weight="600" fill="#0B0B0B">Idempotency key makes a retry safe</text>

<rect x="30" y="36" width="120" height="40" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="90" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>
<rect x="540" y="36" width="130" height="40" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Server</text>

<line x1="90" y1="76" x2="90" y2="290" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="605" y1="76" x2="605" y2="290" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>

<line x1="90" y1="100" x2="605" y2="100" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow26)"/>
<text x="347" y="93" text-anchor="middle" font-size="10" fill="#1D5DA6">POST /payments  Idempotency-Key: abc-123, $50</text>

<text x="605" y="120" text-anchor="end" font-size="9" font-style="italic" fill="#8A8880">processes payment, stores result under abc-123</text>

<line x1="605" y1="140" x2="90" y2="140" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow26)"/>
<text x="347" y="158" text-anchor="middle" font-size="10" fill="#1D9E75">200 OK, payment_id: 789</text>

<text x="347" y="182" text-anchor="middle" font-size="9" font-style="italic" fill="#8A8880">— network issue: client never sees the response, retries —</text>

<line x1="90" y1="204" x2="605" y2="204" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow26)"/>
<text x="347" y="197" text-anchor="middle" font-size="10" fill="#D85A30">POST /payments  Idempotency-Key: abc-123 (retry, same key)</text>

<text x="605" y="222" text-anchor="end" font-size="9" font-style="italic" fill="#8A8880">key already seen — skip reprocessing</text>

<line x1="605" y1="242" x2="90" y2="242" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow26)"/>
<text x="347" y="260" text-anchor="middle" font-size="10" fill="#1D9E75">200 OK, payment_id: 789 (same result — no double charge)</text>

<text x="20" y="308" font-size="11" fill="#52514E">GET, PUT, DELETE are naturally idempotent — POST is not, which is exactly why it needs the key.</text>
</svg>
