<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Monolith versus microservices</title>
<desc>A monolith is one codebase backed by one database; microservices split the same responsibilities into independent services, each with its own database.</desc>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Monolith vs Microservices</text>

<rect x="30" y="50" width="280" height="90" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="170" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Users + Orders + Payments + Inventory</text>
<text x="170" y="102" text-anchor="middle" font-size="10" fill="#5F5E5A">one codebase</text>
<rect x="90" y="112" width="160" height="20" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="170" y="127" text-anchor="middle" font-size="9" fill="#3C3489">one database</text>

<line x1="330" y1="95" x2="330" y2="95"/>
<line x1="340" y1="20" x2="340" y2="300" stroke="#E5E3DC" stroke-width="1"/>

<text x="370" y="46" font-size="12" font-weight="600" fill="#0B0B0B">Microservices</text>

<rect x="370" y="60" width="140" height="42" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="440" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Users Service</text>
<rect x="370" y="112" width="140" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="440" y="128" text-anchor="middle" font-size="9" fill="#3C3489">Users DB</text>

<rect x="530" y="60" width="140" height="42" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="600" y="86" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Orders Service</text>
<rect x="530" y="112" width="140" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="600" y="128" text-anchor="middle" font-size="9" fill="#3C3489">Orders DB</text>

<rect x="370" y="160" width="140" height="42" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="440" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Payments Service</text>
<rect x="370" y="212" width="140" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="440" y="228" text-anchor="middle" font-size="9" fill="#3C3489">Payments DB</text>

<rect x="530" y="160" width="140" height="42" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="600" y="186" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Inventory Service</text>
<rect x="530" y="212" width="140" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="600" y="228" text-anchor="middle" font-size="9" fill="#3C3489">Inventory DB</text>

<text x="20" y="270" font-size="11" fill="#52514E">Independent deploy/scale/fault-isolation vs. distributed complexity and no more free cross-service joins.</text>
</svg>
