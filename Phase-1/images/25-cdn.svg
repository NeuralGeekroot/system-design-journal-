<svg width="100%" viewBox="0 0 700 280" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>CDN edge PoPs serving users near them</title>
<desc>An origin server pushes or lazily replicates content to edge points of presence around the world, and each user is served from the edge closest to them.</desc>
<defs>
  <marker id="arrow25" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">CDN — serve from the nearest edge, not the origin</text>

<rect x="280" y="40" width="140" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="350" y="70" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Origin Server</text>

<rect x="40" y="140" width="150" height="50" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="115" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Edge PoP — London</text>

<rect x="275" y="140" width="150" height="50" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="350" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Edge PoP — Mumbai</text>

<rect x="510" y="140" width="150" height="50" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="585" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Edge PoP — Singapore</text>

<line x1="300" y1="90" x2="130" y2="138" stroke="#8A8880" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow25)"/>
<line x1="350" y1="90" x2="350" y2="138" stroke="#8A8880" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow25)"/>
<line x1="400" y1="90" x2="570" y2="138" stroke="#8A8880" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow25)"/>
<text x="350" y="112" text-anchor="middle" font-size="9" fill="#8A8880">push / pull on cache miss</text>

<rect x="55" y="225" width="120" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="115" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">User — UK</text>
<rect x="290" y="225" width="120" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="350" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">User — India</text>
<rect x="525" y="225" width="120" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="585" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">User — SE Asia</text>

<line x1="115" y1="223" x2="115" y2="192" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow25)" marker-start="url(#arrow25)"/>
<line x1="350" y1="223" x2="350" y2="192" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow25)" marker-start="url(#arrow25)"/>
<line x1="585" y1="223" x2="585" y2="192" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow25)" marker-start="url(#arrow25)"/>
</svg>
