<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Webhook registration and event delivery</title>
<desc>An app registers a callback URL with an event source; later, whenever an event occurs, the source pushes it to the app instead of the app polling for it.</desc>
<defs>
  <marker id="arrow11" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="22" font-size="14" font-weight="600" fill="#0B0B0B">Webhooks — the source calls you, you don't poll it</text>

<rect x="30" y="36" width="130" height="40" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="95" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Your App</text>
<rect x="530" y="36" width="140" height="40" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="600" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Event Source (Stripe)</text>

<line x1="95" y1="76" x2="95" y2="290" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="600" y1="76" x2="600" y2="290" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>

<line x1="95" y1="100" x2="600" y2="100" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow11)"/>
<text x="347" y="93" text-anchor="middle" font-size="10" fill="#1D5DA6">register webhook: https://myapp.com/hook</text>

<text x="347" y="122" text-anchor="middle" font-size="9" font-style="italic" fill="#8A8880">— later, an event happens —</text>

<line x1="600" y1="146" x2="95" y2="146" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow11)"/>
<text x="347" y="139" text-anchor="middle" font-size="10" fill="#D85A30">POST /hook  { event: "payment.completed" }</text>

<line x1="95" y1="170" x2="600" y2="170" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow11)"/>
<text x="347" y="188" text-anchor="middle" font-size="10" fill="#1D9E75">200 OK (acknowledged)</text>

<text x="347" y="212" text-anchor="middle" font-size="9" font-style="italic" fill="#8A8880">— another event —</text>

<line x1="600" y1="236" x2="95" y2="236" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow11)"/>
<text x="347" y="229" text-anchor="middle" font-size="10" fill="#D85A30">POST /hook  { event: "payment.failed" }</text>

<line x1="95" y1="260" x2="600" y2="260" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow11)"/>
<text x="347" y="278" text-anchor="middle" font-size="10" fill="#1D9E75">200 OK</text>

<text x="20" y="308" font-size="11" fill="#52514E">If the app is briefly down, the source retries — so the receiver must be idempotent and verify the payload signature.</text>
</svg>
