<svg width="100%" viewBox="0 0 700 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Load balancer routing and health checks</title>
<desc>A load balancer distributes requests across healthy servers using an algorithm like round robin or least connections, and removes unhealthy servers from rotation.</desc>
<defs>
  <marker id="arrow21" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Load Balancer — traffic cop + health monitor</text>

<rect x="20" y="90" width="100" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="70" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="190" y="90" width="140" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="260" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Load Balancer</text>
<text x="260" y="136" text-anchor="middle" font-size="9" fill="#5F5E5A">round robin / least conn</text>

<rect x="440" y="30" width="130" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="505" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Server 1 — healthy</text>
<rect x="440" y="88" width="130" height="46" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="505" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Server 2 — healthy</text>
<rect x="440" y="146" width="130" height="46" rx="8" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="505" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#8C1D18">Server 3 — down</text>

<line x1="122" y1="120" x2="188" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow21)"/>
<line x1="332" y1="112" x2="438" y2="53" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow21)"/>
<line x1="332" y1="120" x2="438" y2="111" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow21)"/>
<line x1="332" y1="128" x2="438" y2="169" stroke="#B3261E" stroke-width="1.4" stroke-dasharray="4 3"/>
<text x="600" y="172" font-size="9" fill="#8C1D18">health check fails</text>
<text x="600" y="186" font-size="9" fill="#8C1D18">→ removed from pool</text>

<line x1="20" y1="205" x2="680" y2="205" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="228" font-size="11" fill="#52514E">L4 routes by IP/port (fast, protocol-agnostic). L7 routes by URL/header/cookie (content-aware, can terminate TLS).</text>
</svg>
