<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>SQL normalized tables versus a NoSQL document</title>
<desc>SQL stores the same order data as two related tables joined by a foreign key; NoSQL stores it as one self-contained, denormalized document.</desc>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Same data, two models</text>

<text x="30" y="56" font-size="13" font-weight="600" fill="#3C3489">SQL — normalized, joined by key</text>
<rect x="30" y="70" width="230" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="45" y="90" font-size="11" font-weight="600" fill="#3C3489">users</text>
<text x="45" y="108" font-size="10" fill="#534AB7">user_id (PK)</text>
<text x="45" y="124" font-size="10" fill="#534AB7">name, email</text>

<rect x="30" y="160" width="230" height="86" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="45" y="180" font-size="11" font-weight="600" fill="#3C3489">orders</text>
<text x="45" y="198" font-size="10" fill="#534AB7">order_id (PK)</text>
<text x="45" y="214" font-size="10" fill="#534AB7">user_id (FK &#8594; users)</text>
<text x="45" y="230" font-size="10" fill="#534AB7">total_amount</text>

<line x1="145" y1="140" x2="145" y2="158" stroke="#534AB7" stroke-width="1.4"/>
<text x="155" y="152" font-size="9" fill="#534AB7">FK join</text>

<line x1="330" y1="60" x2="330" y2="270" stroke="#E5E3DC" stroke-width="1"/>

<text x="370" y="56" font-size="13" font-weight="600" fill="#0F6E56">NoSQL — one denormalized document</text>
<rect x="370" y="70" width="300" height="176" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="384" y="92" font-size="10" font-family="monospace" fill="#085041">{</text>
<text x="394" y="110" font-size="10" font-family="monospace" fill="#085041">"_id": "order_9001",</text>
<text x="394" y="128" font-size="10" font-family="monospace" fill="#085041">"user": {</text>
<text x="404" y="146" font-size="10" font-family="monospace" fill="#085041">"id": "u_42",</text>
<text x="404" y="164" font-size="10" font-family="monospace" fill="#085041">"name": "Asha Rao"</text>
<text x="394" y="182" font-size="10" font-family="monospace" fill="#085041">},</text>
<text x="394" y="200" font-size="10" font-family="monospace" fill="#085041">"total_amount": 149.50</text>
<text x="384" y="218" font-size="10" font-family="monospace" fill="#085041">}</text>

<line x1="20" y1="270" x2="680" y2="270" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="294" font-size="11" fill="#52514E">SQL: update the user's name once, in one place. NoSQL: the copy embedded in every order document needs its own update.</text>
</svg>
