<svg width="100%" viewBox="0 0 700 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Horizontal scaling behind a load balancer</title>
<desc>Clients hit a load balancer that spreads requests across many stateless servers; more servers can be added at any time with no theoretical ceiling.</desc>
<defs>
  <marker id="arrow20" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Horizontal Scaling — more machines, no ceiling</text>

<rect x="20" y="90" width="110" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Clients</text>

<rect x="190" y="90" width="130" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="255" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Load Balancer</text>

<rect x="400" y="30" width="120" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="460" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 1</text>
<rect x="400" y="86" width="120" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="460" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 2</text>
<rect x="400" y="142" width="120" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="460" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 3</text>
<rect x="400" y="198" width="120" height="46" rx="8" fill="#F7F6F2" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>
<text x="460" y="226" text-anchor="middle" font-size="11" fill="#8A8880">Server N... (add as needed)</text>

<line x1="132" y1="120" x2="188" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow20)"/>
<line x1="322" y1="112" x2="398" y2="53" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow20)"/>
<line x1="322" y1="120" x2="398" y2="109" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow20)"/>
<line x1="322" y1="128" x2="398" y2="165" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow20)"/>
<line x1="322" y1="136" x2="398" y2="221" stroke="#8A8880" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow20)"/>

<text x="20" y="270" font-size="11" fill="#52514E">Requires stateless servers, session state in a shared store (Redis), and its own database scaling story.</text>
</svg>
