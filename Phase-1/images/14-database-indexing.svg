<svg width="100%" viewBox="0 0 640 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>B-Tree index lookup</title>
<desc>A B-Tree index narrows a search from the root node down through branch nodes to the matching leaf rows, instead of scanning the whole table.</desc>
<defs>
  <marker id="arrow14" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Index on users(email) — O(log n) instead of O(n)</text>

<rect x="255" y="46" width="130" height="50" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="320" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#3C3489">Root</text>
<text x="320" y="82" text-anchor="middle" font-size="10" fill="#534AB7">email &lt; "m..." ?</text>

<rect x="90" y="140" width="140" height="50" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="160" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Branch A</text>
<text x="160" y="176" text-anchor="middle" font-size="10" fill="#1D5DA6">a... – l...</text>

<rect x="410" y="140" width="140" height="50" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="480" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Branch B</text>
<text x="480" y="176" text-anchor="middle" font-size="10" fill="#1D5DA6">m... – z...</text>

<line x1="290" y1="96" x2="180" y2="138" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow14)"/>
<line x1="350" y1="96" x2="460" y2="138" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow14)"/>

<rect x="20" y="230" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="95" y="257" text-anchor="middle" font-size="10" fill="#712B13">leaf rows a...-f...</text>
<rect x="190" y="230" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="265" y="257" text-anchor="middle" font-size="10" fill="#712B13">leaf rows g...-l... (match!)</text>
<rect x="360" y="230" width="130" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="425" y="257" text-anchor="middle" font-size="10" fill="#712B13">leaf rows m...-r...</text>
<rect x="500" y="230" width="130" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="565" y="257" text-anchor="middle" font-size="10" fill="#712B13">leaf rows s...-z...</text>

<line x1="140" y1="190" x2="95" y2="228" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow14)"/>
<line x1="180" y1="190" x2="265" y2="228" stroke="#1D9E75" stroke-width="1.6" marker-end="url(#arrow14)"/>
<line x1="460" y1="190" x2="425" y2="228" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow14)"/>
<line x1="500" y1="190" x2="565" y2="228" stroke="#8A8880" stroke-width="1.2" marker-end="url(#arrow14)"/>

<text x="20" y="296" font-size="11" fill="#52514E">Speeds up reads on indexed columns; every write must also update the index.</text>
</svg>
