<svg width="100%" viewBox="0 0 680 220" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Vertical scaling hits a hardware ceiling</title>
<desc>A server is upgraded from small to medium to large, each time with more CPU and RAM, until it hits a hardware ceiling where it cannot scale further.</desc>
<defs>
  <marker id="arrow19" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Vertical Scaling — bigger machine, same architecture</text>

<rect x="20" y="130" width="90" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="65" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#085041">Small</text>
<text x="65" y="166" text-anchor="middle" font-size="9" fill="#0F6E56">2 CPU / 4GB</text>

<rect x="170" y="105" width="115" height="75" rx="8" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="227" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#123E70">Medium</text>
<text x="227" y="153" text-anchor="middle" font-size="9" fill="#1D5DA6">8 CPU / 32GB</text>

<rect x="345" y="70" width="140" height="110" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="415" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Large</text>
<text x="415" y="138" text-anchor="middle" font-size="10" fill="#993C1D">64 CPU / 256GB</text>

<rect x="545" y="70" width="115" height="110" rx="8" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="602" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#8C1D18">Ceiling</text>
<text x="602" y="136" text-anchor="middle" font-size="9" fill="#B3261E">no bigger box</text>
<text x="602" y="150" text-anchor="middle" font-size="9" fill="#B3261E">left to buy</text>

<line x1="112" y1="155" x2="168" y2="142" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow19)"/>
<text x="140" y="130" text-anchor="middle" font-size="9" fill="#52514E">upgrade</text>
<line x1="287" y1="140" x2="343" y2="125" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow19)"/>
<text x="315" y="112" text-anchor="middle" font-size="9" fill="#52514E">upgrade</text>
<line x1="487" y1="125" x2="543" y2="125" stroke="#8A8880" stroke-width="1.4" marker-end="url(#arrow19)"/>
<text x="515" y="112" text-anchor="middle" font-size="9" fill="#52514E">upgrade</text>

<text x="20" y="205" font-size="11" fill="#52514E">Simple — no code changes needed — but there's a hard ceiling and the single machine is a single point of failure.</text>
</svg>
