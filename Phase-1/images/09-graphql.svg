<svg width="100%" viewBox="0 0 700 340" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>REST multiple round trips vs GraphQL single query</title>
<desc>REST requires three separate requests to assemble a profile page, while GraphQL fetches the same nested data in one request.</desc>
<defs>
  <marker id="arrow9" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="22" font-size="14" font-weight="600" fill="#0B0B0B">REST — 3 round trips for one profile page</text>
<rect x="20" y="36" width="90" height="110" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="65" y="94" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="230" y="40" width="180" height="28" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="320" y="58" text-anchor="middle" font-size="10" fill="#712B13">GET /users/42</text>
<rect x="230" y="76" width="180" height="28" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="320" y="94" text-anchor="middle" font-size="10" fill="#712B13">GET /users/42/posts</text>
<rect x="230" y="112" width="180" height="28" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="320" y="130" text-anchor="middle" font-size="10" fill="#712B13">GET /users/42/friends</text>

<line x1="112" y1="54" x2="228" y2="54" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow9)"/>
<line x1="112" y1="90" x2="228" y2="90" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow9)"/>
<line x1="112" y1="126" x2="228" y2="126" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow9)"/>

<line x1="20" y1="172" x2="680" y2="172" stroke="#E5E3DC" stroke-width="1"/>

<text x="20" y="200" font-size="14" font-weight="600" fill="#0B0B0B">GraphQL — 1 round trip, exact fields requested</text>
<rect x="20" y="216" width="90" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="65" y="250" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="230" y="216" width="440" height="60" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="450" y="240" text-anchor="middle" font-size="10" fill="#3C3489" font-family="monospace">POST /graphql</text>
<text x="450" y="258" text-anchor="middle" font-size="10" fill="#3C3489" font-family="monospace">query { user(id:42){ name posts{title} friends{name} } }</text>

<line x1="112" y1="246" x2="228" y2="246" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow9)"/>

<text x="20" y="310" font-size="11" fill="#52514E">Single endpoint, client-shaped response — trades easy HTTP caching for exact-fit data and fewer round trips.</text>
</svg>
