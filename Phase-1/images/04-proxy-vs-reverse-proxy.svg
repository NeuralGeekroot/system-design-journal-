<svg width="100%" viewBox="0 0 700 400" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Forward Proxy vs Reverse Proxy</title>
<desc>A forward proxy sits in front of clients and hides them from the server. A reverse proxy sits in front of servers and hides them from the client.</desc>
<defs>
  <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="26" font-size="15" font-weight="600" fill="#0B0B0B">Forward Proxy — hides the client</text>

<rect x="20" y="46" width="120" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="80" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="200" y="46" width="140" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="270" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Forward Proxy</text>
<text x="270" y="90" text-anchor="middle" font-size="10" fill="#5F5E5A">VPN / corporate gateway</text>

<rect x="420" y="46" width="240" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="540" y="72" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Internet / Server</text>
<text x="540" y="90" text-anchor="middle" font-size="10" fill="#993C1D">sees only the proxy's IP</text>

<line x1="142" y1="76" x2="198" y2="76" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>
<line x1="342" y1="76" x2="418" y2="76" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>

<line x1="20" y1="140" x2="680" y2="140" stroke="#E5E3DC" stroke-width="1"/>

<text x="20" y="168" font-size="15" font-weight="600" fill="#0B0B0B">Reverse Proxy — hides the server(s)</text>

<rect x="20" y="188" width="200" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="120" y="214" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>
<text x="120" y="232" text-anchor="middle" font-size="10" fill="#0F6E56">sees only the reverse proxy</text>

<rect x="270" y="188" width="150" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="345" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Reverse Proxy</text>

<line x1="222" y1="218" x2="268" y2="218" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>

<rect x="470" y="150" width="110" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="525" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 1</text>
<rect x="470" y="212" width="110" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="525" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 2</text>
<rect x="470" y="274" width="110" height="50" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="525" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#712B13">Server 3</text>

<line x1="422" y1="210" x2="468" y2="178" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>
<line x1="422" y1="218" x2="468" y2="238" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>
<line x1="422" y1="226" x2="468" y2="298" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow4)"/>

<text x="20" y="360" font-size="12" fill="#52514E">Forward proxy = privacy / content filtering for the client. Reverse proxy = load balancing, TLS termination, caching for the servers.</text>
</svg>
