<svg width="100%" viewBox="0 0 700 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Rate limiter allow/reject decision using a token bucket</title>
<desc>Incoming requests consume tokens from a bucket that refills at a fixed rate; requests are allowed while tokens remain and rejected with a 429 once the bucket is empty.</desc>
<defs>
  <marker id="arrow29" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Rate Limiting — token bucket</text>

<rect x="20" y="90" width="110" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="220" y="80" width="180" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="310" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Rate Limiter</text>
<text x="310" y="124" text-anchor="middle" font-size="10" fill="#5F5E5A">tokens: 50 / 200 used</text>
<text x="310" y="140" text-anchor="middle" font-size="9" fill="#5F5E5A">refills at a fixed rate</text>

<rect x="500" y="30" width="170" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="585" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">Allow</text>
<text x="585" y="68" text-anchor="middle" font-size="9" fill="#0F6E56">forward to backend</text>

<rect x="500" y="140" width="170" height="50" rx="10" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="585" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#8C1D18">Reject</text>
<text x="585" y="178" text-anchor="middle" font-size="9" fill="#B3261E">429 Too Many Requests</text>

<line x1="132" y1="120" x2="218" y2="120" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow29)"/>
<line x1="400" y1="105" x2="498" y2="60" stroke="#1D9E75" stroke-width="1.4" marker-end="url(#arrow29)"/>
<text x="450" y="72" text-anchor="middle" font-size="9" fill="#1D9E75">tokens left</text>
<line x1="400" y1="135" x2="498" y2="165" stroke="#B3261E" stroke-width="1.4" marker-end="url(#arrow29)"/>
<text x="450" y="150" text-anchor="middle" font-size="9" fill="#8C1D18">bucket empty</text>

<line x1="20" y1="220" x2="680" y2="220" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="244" font-size="11" fill="#52514E">Token bucket tolerates short bursts up to the bucket size while smoothing the long-run average rate.</text>
<text x="20" y="264" font-size="11" fill="#52514E">Enforced at the API Gateway/edge — protects against abuse and enforces tiered plans (free vs paid).</text>
</svg>
