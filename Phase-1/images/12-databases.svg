<svg width="100%" viewBox="0 0 720 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Database types by access pattern</title>
<desc>An application chooses between relational, document, key-value, graph, and wide-column databases depending on data shape and access pattern.</desc>
<defs>
  <marker id="arrow12" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Databases — pick by access pattern, not popularity</text>

<rect x="290" y="40" width="140" height="46" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="360" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Application</text>

<rect x="10" y="140" width="130" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="75" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Relational</text>
<text x="75" y="184" text-anchor="middle" font-size="10" fill="#534AB7">Postgres, MySQL</text>

<rect x="155" y="140" width="130" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="220" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Document</text>
<text x="220" y="184" text-anchor="middle" font-size="10" fill="#0F6E56">MongoDB</text>

<rect x="300" y="140" width="130" height="66" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="365" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">Key-Value</text>
<text x="365" y="184" text-anchor="middle" font-size="10" fill="#1D5DA6">Redis, DynamoDB</text>

<rect x="445" y="140" width="130" height="66" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="510" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Graph</text>
<text x="510" y="184" text-anchor="middle" font-size="10" fill="#993C1D">Neo4j</text>

<rect x="590" y="140" width="120" height="66" rx="10" fill="#FCE8E6" stroke="#B3261E" stroke-width="1"/>
<text x="650" y="160" text-anchor="middle" font-size="12" font-weight="600" fill="#8C1D18">Wide-Column</text>
<text x="650" y="178" text-anchor="middle" font-size="10" fill="#B3261E">Cassandra</text>

<line x1="330" y1="86" x2="90" y2="138" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow12)"/>
<line x1="345" y1="86" x2="230" y2="138" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow12)"/>
<line x1="360" y1="86" x2="365" y2="138" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow12)"/>
<line x1="380" y1="86" x2="500" y2="138" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow12)"/>
<line x1="400" y1="86" x2="640" y2="138" stroke="#8A8880" stroke-width="1.3" marker-end="url(#arrow12)"/>

<text x="20" y="236" font-size="11" fill="#52514E">Joins + consistency → relational. Evolving schema → document. Sub-ms lookups → key-value. Relationships → graph. Write-heavy → wide-column.</text>
</svg>
