<svg width="100%" viewBox="0 0 700 280" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Producer, queue, and multiple consumers</title>
<desc>A producer drops a message onto a queue and moves on; each consumer processes it independently and at its own pace.</desc>
<defs>
  <marker id="arrow28" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Message Queue — decouple producer from consumers</text>

<rect x="20" y="100" width="140" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="90" y="126" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Producer</text>
<text x="90" y="144" text-anchor="middle" font-size="9" fill="#0F6E56">Order Service</text>

<rect x="260" y="90" width="170" height="80" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="345" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Message Queue</text>
<text x="345" y="140" text-anchor="middle" font-size="9" fill="#5F5E5A">Kafka / RabbitMQ / SQS</text>
<text x="345" y="156" text-anchor="middle" font-size="9" fill="#5F5E5A">messages persist until read</text>

<rect x="530" y="30" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Consumer — Email</text>

<rect x="530" y="90" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="118" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Consumer — Inventory</text>

<rect x="530" y="150" width="150" height="46" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="178" text-anchor="middle" font-size="10" font-weight="600" fill="#712B13">Consumer — Analytics</text>

<line x1="162" y1="130" x2="258" y2="130" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow28)"/>
<text x="210" y="122" text-anchor="middle" font-size="9" fill="#1D9E75">1 send</text>

<line x1="432" y1="115" x2="528" y2="55" stroke="#5F5E5A" stroke-width="1.3" marker-end="url(#arrow28)"/>
<line x1="432" y1="130" x2="528" y2="113" stroke="#5F5E5A" stroke-width="1.3" marker-end="url(#arrow28)"/>
<line x1="432" y1="145" x2="528" y2="173" stroke="#5F5E5A" stroke-width="1.3" marker-end="url(#arrow28)"/>
<text x="475" y="200" text-anchor="middle" font-size="9" fill="#5F5E5A">2 each consumer reads at its own pace</text>

<text x="20" y="240" font-size="11" fill="#52514E">If Email is down, messages wait in the queue — the Order Service never blocks on it.</text>
</svg>
