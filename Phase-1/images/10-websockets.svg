<svg width="100%" viewBox="0 0 700 420" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>WebSocket handshake, bidirectional messages, and scaling with a pub/sub backplane</title>
<desc>An HTTP request upgrades to a persistent WebSocket connection; afterward either side can push messages at any time. Scaling across servers needs a shared pub/sub backplane like Redis.</desc>
<defs>
  <marker id="arrow10" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="22" font-size="14" font-weight="600" fill="#0B0B0B">WebSocket — upgrade once, then push either way</text>

<rect x="30" y="36" width="110" height="40" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="85" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>
<rect x="550" y="36" width="110" height="40" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="605" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">Server</text>

<line x1="85" y1="76" x2="85" y2="230" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>
<line x1="605" y1="76" x2="605" y2="230" stroke="#C9C7BE" stroke-width="1" stroke-dasharray="4 3"/>

<line x1="85" y1="98" x2="605" y2="98" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow10)"/>
<text x="345" y="91" text-anchor="middle" font-size="10" fill="#1D5DA6">GET /chat (Upgrade: websocket)</text>

<line x1="605" y1="122" x2="85" y2="122" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow10)"/>
<text x="345" y="115" text-anchor="middle" font-size="10" fill="#1D5DA6">101 Switching Protocols</text>

<text x="345" y="140" text-anchor="middle" font-size="9" font-style="italic" fill="#52514E">— persistent, full-duplex connection —</text>

<line x1="85" y1="162" x2="605" y2="162" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow10)"/>
<text x="345" y="155" text-anchor="middle" font-size="10" fill="#1D9E75">{"msg":"hi"}</text>

<line x1="605" y1="186" x2="85" y2="186" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow10)"/>
<text x="345" y="179" text-anchor="middle" font-size="10" fill="#D85A30">{"msg":"hello back"}</text>

<line x1="605" y1="210" x2="85" y2="210" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow10)"/>
<text x="345" y="203" text-anchor="middle" font-size="10" fill="#D85A30">{"event":"new_notification"} — unprompted push</text>

<line x1="20" y1="250" x2="680" y2="250" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="272" font-size="13" font-weight="600" fill="#0B0B0B">Scaling past one server needs a shared backplane</text>

<rect x="20" y="290" width="120" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="80" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">User A — Server 1</text>

<rect x="290" y="290" width="120" height="50" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="350" y="312" text-anchor="middle" font-size="11" font-weight="600" fill="#44443F">Redis</text>
<text x="350" y="328" text-anchor="middle" font-size="10" fill="#5F5E5A">Pub/Sub backplane</text>

<rect x="560" y="290" width="120" height="50" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="620" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">User B — Server 2</text>

<line x1="142" y1="315" x2="288" y2="315" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow10)" marker-start="url(#arrow10)"/>
<line x1="412" y1="315" x2="558" y2="315" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow10)" marker-start="url(#arrow10)"/>

<text x="20" y="375" font-size="11" fill="#52514E">User A's message publishes to Redis; Server 2 relays it to User B, even though User B never connected to Server 1.</text>
</svg>
