<svg width="100%" viewBox="0 0 700 320" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Normalized tables versus a denormalized table</title>
<desc>Rendering an order normally requires joining orders, users, and products; a denormalized orders table duplicates the user name and product title so one read is enough.</desc>
<defs>
  <marker id="arrow17" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Normalized (2 joins) vs Denormalized (0 joins)</text>

<text x="30" y="52" font-size="12" font-weight="600" fill="#3C3489">Normalized — 3NF</text>
<rect x="30" y="64" width="140" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="100" y="94" text-anchor="middle" font-size="10" fill="#3C3489">users</text>
<rect x="30" y="180" width="140" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="100" y="210" text-anchor="middle" font-size="10" fill="#3C3489">products</text>
<rect x="200" y="122" width="140" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="270" y="152" text-anchor="middle" font-size="10" fill="#3C3489">orders</text>

<line x1="270" y1="122" x2="130" y2="116" stroke="#534AB7" stroke-width="1.3" marker-end="url(#arrow17)"/>
<text x="185" y="112" font-size="9" fill="#534AB7">JOIN</text>
<line x1="270" y1="172" x2="130" y2="192" stroke="#534AB7" stroke-width="1.3" marker-end="url(#arrow17)"/>
<text x="185" y="192" font-size="9" fill="#534AB7">JOIN</text>

<line x1="380" y1="20" x2="380" y2="290" stroke="#E5E3DC" stroke-width="1"/>

<text x="410" y="52" font-size="12" font-weight="600" fill="#0F6E56">Denormalized — read-optimized</text>
<rect x="410" y="70" width="260" height="130" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="424" y="92" font-size="11" font-weight="600" fill="#085041">orders_denormalized</text>
<text x="424" y="112" font-size="10" fill="#0F6E56">order_id, user_id</text>
<text x="424" y="130" font-size="10" fill="#0F6E56"><tspan font-weight="600">user_name</tspan> (redundant copy)</text>
<text x="424" y="148" font-size="10" fill="#0F6E56">product_id</text>
<text x="424" y="166" font-size="10" fill="#0F6E56"><tspan font-weight="600">product_title</tspan> (redundant copy)</text>
<text x="424" y="184" font-size="10" fill="#0F6E56">price</text>

<line x1="20" y1="250" x2="680" y2="250" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="274" font-size="11" fill="#52514E">Normalized: update a name once, no anomalies, but every read pays for joins.</text>
<text x="20" y="294" font-size="11" fill="#52514E">Denormalized: one-row reads, but every redundant copy must be kept in sync on write.</text>
</svg>
