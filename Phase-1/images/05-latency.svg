<svg width="100%" viewBox="0 0 700 260" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Where latency comes from</title>
<desc>A request passes through network propagation, a load balancer queue, an app server, and a database, accumulating a different type of delay at each hop.</desc>
<defs>
  <marker id="arrow5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="26" font-size="15" font-weight="600" fill="#0B0B0B">Latency — one delay type added at every hop</text>

<rect x="20" y="60" width="110" height="66" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="75" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Client</text>

<rect x="160" y="60" width="120" height="66" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="220" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">Network</text>
<text x="220" y="100" text-anchor="middle" font-size="10" fill="#1D5DA6">propagation delay</text>

<rect x="310" y="60" width="120" height="66" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="370" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Load Balancer</text>
<text x="370" y="100" text-anchor="middle" font-size="10" fill="#5F5E5A">queuing delay</text>

<rect x="460" y="60" width="110" height="66" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="515" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">App Server</text>
<text x="515" y="100" text-anchor="middle" font-size="10" fill="#993C1D">processing delay</text>

<rect x="600" y="60" width="90" height="66" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="645" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Database</text>
<text x="645" y="100" text-anchor="middle" font-size="10" fill="#534AB7">processing delay</text>

<line x1="132" y1="93" x2="158" y2="93" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow5)"/>
<line x1="282" y1="93" x2="308" y2="93" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow5)"/>
<line x1="432" y1="93" x2="458" y2="93" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow5)"/>
<line x1="572" y1="93" x2="598" y2="93" stroke="#8A8880" stroke-width="1.5" marker-end="url(#arrow5)"/>

<line x1="20" y1="150" x2="690" y2="150" stroke="#E5E3DC" stroke-width="1"/>
<text x="20" y="176" font-size="12" font-weight="600" fill="#0B0B0B">Rough round-trip feel</text>
<text x="20" y="198" font-size="11" fill="#52514E">Same datacenter ~1ms  ·  Same continent ~30-80ms  ·  Cross-continent ~150-250ms</text>
<text x="20" y="222" font-size="11" fill="#52514E">You can't beat propagation delay — fixes are "get closer" (CDN, regional deploy) or "skip the trip" (cache).</text>
</svg>
