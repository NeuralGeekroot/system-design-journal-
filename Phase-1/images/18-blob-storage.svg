<svg width="100%" viewBox="0 0 700 300" role="img" font-family="Arial, Helvetica, sans-serif" xmlns="http://www.w3.org/2000/svg">
<title>Blob storage upload and delivery path</title>
<desc>An app server uploads a large file to blob storage, stores only the returned URL in the database, and users download the file through a CDN edge.</desc>
<defs>
  <marker id="arrow18" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text x="20" y="24" font-size="15" font-weight="600" fill="#0B0B0B">Large files live in blob storage, not the database</text>

<rect x="20" y="110" width="120" height="60" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="80" y="144" text-anchor="middle" font-size="12" font-weight="600" fill="#712B13">App Server</text>

<rect x="240" y="110" width="130" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="305" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#44443F">Blob Store</text>
<text x="305" y="154" text-anchor="middle" font-size="10" fill="#5F5E5A">S3 / GCS</text>

<rect x="240" y="220" width="130" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="305" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#3C3489">Database</text>

<rect x="470" y="110" width="120" height="60" rx="10" fill="#E3F0FC" stroke="#1D5DA6" stroke-width="1"/>
<text x="530" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#123E70">CDN Edge</text>
<text x="530" y="154" text-anchor="middle" font-size="10" fill="#1D5DA6">cached copy</text>

<rect x="620" y="110" width="70" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text x="655" y="144" text-anchor="middle" font-size="11" font-weight="600" fill="#085041">User</text>

<line x1="142" y1="132" x2="238" y2="132" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow18)"/>
<text x="190" y="124" text-anchor="middle" font-size="9" fill="#1D9E75">1 upload</text>

<line x1="238" y1="150" x2="142" y2="150" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow18)"/>
<text x="190" y="168" text-anchor="middle" font-size="9" fill="#D85A30">2 return URL</text>

<line x1="200" y1="172" x2="270" y2="218" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow18)"/>
<text x="130" y="205" font-size="9" fill="#5F5E5A">3 store URL</text>

<line x1="370" y1="138" x2="468" y2="138" stroke="#1D5DA6" stroke-width="1.5" marker-end="url(#arrow18)"/>
<text x="418" y="130" text-anchor="middle" font-size="9" fill="#1D5DA6">4 replicate</text>

<line x1="592" y1="140" x2="618" y2="140" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow18)"/>
<text x="655" y="126" text-anchor="middle" font-size="9" fill="#1D9E75">5 download</text>

<line x1="20" y1="300" x2="20" y2="300"/>
<text x="20" y="240" font-size="11" font-style="italic" fill="#8A8880">posts.media_url = "https://cdn.example.com/posts/abc123.jpg"</text>
</svg>
